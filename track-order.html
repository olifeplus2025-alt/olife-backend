<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order - OlifePlus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #f9f9f6;
      --fg: #0a2622;
      --primary: #0a2622;
      --secondary: #e8f2ec;
      --accent: #b99470;
      --border: #d0ddd5;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'Inter', sans-serif
    }

    body {
      font-family: var(--sans);
      background: linear-gradient(135deg, var(--secondary), var(--bg));
      color: var(--fg);
      min-height: 100vh;
      padding: 26px
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 18px 45px rgba(10, 38, 34, .08);
      border: 1px solid rgba(10, 38, 34, .08);
      overflow: hidden
    }

    .hero {
      padding: 42px 38px;
      background: rgba(249, 249, 246, .92);
      border-bottom: 1px solid rgba(10, 38, 34, .08)
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      line-height: 1.05
    }

    .sub {
      margin-top: 12px;
      line-height: 1.8;
      color: rgba(10, 38, 34, .62)
    }

    .content {
      padding: 34px 38px
    }

    .search {
      display: flex;
      gap: 12px;
      margin-bottom: 24px
    }

    input {
      flex: 1;
      padding: 14px 15px;
      border: 1px solid rgba(10, 38, 34, .15);
      background: #fff;
      color: var(--fg);
      outline: none
    }

    input:focus {
      border-color: var(--accent)
    }

    .btn {
      padding: 14px 18px;
      border: 0;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: 12px;
      text-decoration: none;
      display: inline-block
    }

    .btn:hover {
      background: var(--accent)
    }

    .order-card {
      border: 1px solid var(--border);
      background: #fff;
      padding: 22px;
      margin-top: 20px
    }

    .meta {
      color: rgba(10, 38, 34, .65);
      line-height: 1.8;
      margin-top: 8px
    }

    .steps {
      margin-top: 28px;
      display: grid;
      gap: 14px
    }

    .step {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: start
    }

    .dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: rgba(10, 38, 34, .5)
    }

    .step.done .dot {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary)
    }

    .step.active .dot {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    .step-title {
      font-weight: 600;
      letter-spacing: .04em
    }

    .step-text {
      font-size: 14px;
      color: rgba(10, 38, 34, .58);
      margin-top: 4px
    }

    .msg {
      padding: 14px;
      background: rgba(232, 242, 236, .65);
      border: 1px solid rgba(10, 38, 34, .08);
      line-height: 1.6
    }

    .links {
      margin-top: 24px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap
    }

    @media(max-width:650px) {
      body {
        padding: 14px
      }

      .hero,
      .content {
        padding: 28px 20px
      }

      .search {
        display: block
      }

      .search .btn {
        width: 100%;
        margin-top: 10px;
        text-align: center
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Order Tracking</div>
      <h1>Track your order</h1>
      <p class="sub">Enter your Order ID or open this page from My Account order history.</p>
    </div>
    <div class="content">
      <div class="search">
        <input id="orderIdInput" placeholder="Example: OLIFE-1234567890">
        <button class="btn" onclick="loadOrder()">Track</button>
      </div>
      <button class="btn" onclick="generateInvoice()">Download Invoice</button>
      <button class="btn" style="background:#b94a48;" onclick="cancelOrder()">
        Cancel Order
      </button>
      <div id="result" class="msg">Loading order details...</div>
      <div class="links">
        <a class="btn" href="my-account.html">My Account</a>
        <a class="btn" href="index.html">Back to Website</a>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-helpers.js"></script>
  <script>
    const defaultSteps = ["Order Placed", "Confirmed", "Packed", "Shipped", "Out for Delivery", "Delivered"];
    const BACKEND_URL = "https://olife-backend.onrender.com";

    function readJson(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
      catch (e) { return fallback; }
    }

    function formatDate(value) {
      if (!value) return "—";
      try { return new Date(value).toLocaleString(); } catch (e) { return value; }
    }

    function findLocalOrder(orderId) {
      const history = readJson("olifeplusOrderHistory", []);
      const finalOrder = readJson("olifeplusFinalOrder", null);
      const all = Array.isArray(history) ? history.slice() : [];
      if (finalOrder) all.unshift(finalOrder);
      return all.find(o => String(o.orderId || "").trim() === String(orderId || "").trim()) || null;
    }

    function renderOrder(order) {
      if (!order) {
        document.getElementById("result").innerHTML = "Order not found. Please check your Order ID.";
        return;
      }

      const steps = order.trackingSteps || defaultSteps;
      const currentStep = Number(order.currentStep || 0);
      const items = Array.isArray(order.items) ? order.items.map(i => `${i.name || "Product"} × ${i.quantity || 1}`).join(", ") : "Order details saved";
      // 🔥 FINAL TOTAL CALCULATION (SAME AS CHECKOUT)
      const subtotal = (order.items || []).reduce((sum, item) => {
        return sum + (item.price * item.quantity);
      }, 0);

      const shipping = subtotal === 0 ? 0 : (subtotal >= 499 ? 0 : 49);

      let base = subtotal + shipping;
      let codCharge = 0;

      const payment = (order.paymentOption || order.paymentType || "").toLowerCase().trim();

      const isCOD =
        payment === "cod" ||
        payment === "cash on delivery" ||
        payment.includes("cod") ||
        payment.includes("cash");

      if (isCOD) {
        codCharge = Math.ceil(base * 0.05);
      }

      const finalTotal = Number(order.total || order.totalAmount || (base + codCharge));
      const stepsHtml = steps.map((step, index) => {
        const cls = index < currentStep ? "done" : (index === currentStep ? "active" : "");
        const text = index < currentStep ? "Completed" : (index === currentStep ? "Current status" : "Pending");
        return `<div class="step ${cls}">
          <div class="dot">${index < currentStep ? "✓" : index + 1}</div>
          <div><div class="step-title">${step}</div><div class="step-text">${text}</div></div>
        </div>`;
      }).join("");

      document.getElementById("result").className = "order-card";
      document.getElementById("result").innerHTML = `
        <h2>${order.orderId || "Order"}</h2>
        <div class="meta"><strong>Status:</strong> ${order.status || steps[currentStep] || "Order Placed"}</div>
        <div class="meta"><strong>Date:</strong> ${formatDate(order.orderedAt)}</div>
        <div class="meta"><strong>Payment:</strong> ${order.paymentOption || "—"}</div>
        <div class="meta"><strong>Total:</strong> ₹${finalTotal}</div>
        <div class="meta"><strong>Items:</strong> ${items}</div>
        <div class="steps">${stepsHtml}</div>
      `;
    }

    async function loadOrder() {
      const input = document.getElementById("orderIdInput");

      const orderId = (
        input.value ||
        localStorage.getItem("olifeplusTrackOrderId") ||
        ""
      ).trim();

      if (!orderId) {
        document.getElementById("result").innerHTML =
          "Please enter Order ID.";
        return;
      }

      input.value = orderId;

      document.getElementById("result").className = "msg";
      document.getElementById("result").innerHTML =
        "Checking latest status...";

      let order = null;

      // 🔥 Firebase Order
      try {
        if (window.OlifeFirebase && window.OlifeFirebase.getOrderById) {
          order = await window.OlifeFirebase.getOrderById(orderId);
        }
      } catch (e) {
        console.error("Firebase Error:", e);
      }

      // 🔥 Local Backup
      if (!order) {
        order = findLocalOrder(orderId);
      }

      // 🔥 Final LocalStorage Merge
      const localOrder = JSON.parse(
        localStorage.getItem("olifeplusFinalOrder") || "null"
      );

      if (
        localOrder &&
        String(localOrder.orderId || "").trim() === orderId
      ) {
        order = {
          ...order,
          ...localOrder,

          // 🔥 Safe Nimbus Fields
          nimbusOrderId:
            localOrder.nimbusOrderId ||
            order?.nimbusOrderId ||
            "",

          awb:
            localOrder.awb ||
            order?.awb ||
            ""
        };
      }

      // 🔥 Save globally
      currentOrder = order;

      // 🔥 Render
      renderOrder(order);

      // 🔥 Debug
      console.log("LIVE ORDER:", currentOrder);
    }

    let currentOrder = null;
    function generateInvoice() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      if (!currentOrder) {
        alert("Please load order first");
        return;
      }

      const order = currentOrder;
      const items = order.items || [];
      const pageWidth = doc.internal.pageSize.getWidth();

      const logoUrl = "logo.png"; // 👈 tamaro logo path

      const img = new Image();
      img.crossOrigin = "anonymous";

      // 🔥 Try load logo
      img.onload = () => buildPDF(doc, order, items, pageWidth, img);
      img.onerror = () => buildPDF(doc, order, items, pageWidth, null);

      img.src = logoUrl;
    }


    // 🔥 MAIN BUILDER (NO BREAK)
    function buildPDF(doc, order, items, pageWidth, img) {

      // ===== WATERMARK (BIG CENTER LOGO) =====
      if (img) {
        doc.setGState(new doc.GState({ opacity: 0.08 })); // 🔥 light watermark
        doc.addImage(img, "PNG", 40, 80, 120, 80);
        doc.setGState(new doc.GState({ opacity: 1 }));
      }

      // ===== HEADER =====
      doc.setFillColor(10, 38, 34);
      doc.rect(0, 0, pageWidth, 32, "F");

      // LOGO (TOP LEFT)
      if (img) {
        doc.addImage(img, "PNG", 15, 6, 30, 18);
      }

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(14);
      doc.text("INVOICE", pageWidth - 45, 18);

      doc.setTextColor(0, 0, 0);

      // ===== BOX =====
      doc.setDrawColor(200);
      doc.rect(15, 40, pageWidth - 30, 65);

      // LEFT SIDE
      doc.setFontSize(11);
      doc.text("Bill To:", 20, 50);

      doc.setFontSize(10);

      const address = [
        order.customerName,
        order.phoneNumber,
        order.houseNumber,
        order.societyName,
        order.area,
        order.city
      ].filter(Boolean).join(", ");

      const lines = doc.splitTextToSize(address, 80);
      doc.text(lines, 20, 58);

      // RIGHT SIDE
      doc.text("Order ID:", 120, 50);
      doc.text(order.orderId || "-", 140, 50);

      doc.text("Date:", 120, 58);
      doc.text(formatDate(order.orderedAt) || "-", 140, 58);

      doc.text("Payment:", 120, 66);
      doc.text(order.paymentOption || "-", 140, 66);

      // ===== TABLE =====
      let subtotal = 0;

      const tableData = items.map(item => {
        const t = (item.price || 0) * (item.quantity || 1);
        subtotal += t;

        return [
          item.name || "Product",
          item.quantity || 1,
          "Rs. " + item.price,
          "Rs. " + t
        ];
      });

      doc.autoTable({
        startY: 110,
        head: [["Product", "Qty", "Price", "Total"]],
        body: tableData,
        headStyles: {
          fillColor: [10, 38, 34],
          textColor: 255
        }
      });

      // ===== TOTAL =====
      let shipping = subtotal >= 499 ? 0 : 49;
      let total = subtotal + shipping;

      let codCharge = 0;
      if (order.paymentOption === "Cash on Delivery") {
        codCharge = Math.ceil((subtotal + shipping) * 0.05);
        total += codCharge;
      }

      let y = doc.lastAutoTable.finalY + 10;

      doc.rect(120, y, 75, 45);

      let ty = y + 8;

      doc.text("Subtotal:", 125, ty);
      doc.text("Rs. " + subtotal, 185, ty, { align: "right" });
      ty += 7;

      doc.text("Shipping:", 125, ty);
      doc.text("Rs. " + shipping, 185, ty, { align: "right" });
      ty += 7;

      if (codCharge > 0) {
        doc.text("COD Charges:", 125, ty);
        doc.text("Rs. " + Math.round(codCharge), 185, ty, { align: "right" });
        ty += 7;
      }

      doc.setFont("helvetica", "bold");
      doc.text("Total:", 125, ty);
      doc.text("Rs. " + Math.round(total), 185, ty, { align: "right" });

      // FOOTER
      doc.setFontSize(9);
      doc.setTextColor(120);
      doc.text("OlifePlus Pvt Ltd | Ahmedabad, Gujarat", 20, 280);

      doc.save(`Invoice_${order.orderId}.pdf`);
    }
    function updateOrderEverywhere(updatedOrder) {
      let history = readJson("olifeplusOrderHistory", []);
      if (!Array.isArray(history)) history = [];
      history = history.map(o => String(o.orderId || "") === String(updatedOrder.orderId || "") ? updatedOrder : o);
      localStorage.setItem("olifeplusOrderHistory", JSON.stringify(history));

      let orders = readJson("orders", []);
      if (!Array.isArray(orders)) orders = [];
      orders = orders.map(o => String(o.orderId || "") === String(updatedOrder.orderId || "") ? updatedOrder : o);
      localStorage.setItem("orders", JSON.stringify(orders));

      const finalOrder = readJson("olifeplusFinalOrder", null);
      if (finalOrder && String(finalOrder.orderId || "") === String(updatedOrder.orderId || "")) {
        localStorage.setItem("olifeplusFinalOrder", JSON.stringify(updatedOrder));
      }
    }
    async function cancelOrder() {
      if (!currentOrder) {
        alert("Please load order first");
        return;
      }

      if (!currentOrder.nimbusOrderId) {
        alert("Nimbus Order ID missing. Cannot cancel.");
        return;
      }

      if ((currentOrder.status || "").toLowerCase().includes("delivered")) {
        alert("Order already delivered. Cannot cancel.");
        return;
      }

      const confirmCancel = confirm("Are you sure you want to cancel this order?");
      if (!confirmCancel) return;

      try {
        document.getElementById("result").innerHTML = "Cancelling order...";

        const response = await fetch(
          `${BACKEND_URL}/cancel-order`,
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({


              nimbusOrderId:
                currentOrder.nimbusOrderId

            })

          }
        );

        const data = await response.json();

        console.log("🔥 Cancel Response:", data);

        if (!data.success) {

          alert(data.message || "Cancel failed");

          return;

        }


        // 🔥 UPDATE LOCAL
        currentOrder = {
          ...currentOrder,
          status: "Cancelled",
          shipmentStatus: "Cancelled",
          cancelledAt: new Date().toISOString()
        };

        updateOrderEverywhere(currentOrder);

        document.getElementById("result").className = "order-card";
        document.getElementById("result").innerHTML = `
      <h2 style="color:red;">Order Cancelled ✅</h2>
      <div class="meta"><strong>Order ID:</strong> ${currentOrder.orderId}</div>
      <div class="meta"><strong>Status:</strong> Cancelled</div>
    `;

      } catch (err) {
        console.error(err);
        alert("Cancel error: " + err.message);
      }
    }
    document.addEventListener("DOMContentLoaded", loadOrder);
  </script>
</body>

</html>
