<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - OlifePlus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }

    :root {
      --bg: #f9f9f6;
      --fg: #0a2622;
      --primary: #0a2622;
      --primary-fg: #f9f9f6;
      --secondary: #e8f2ec;
      --accent: #b99470;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'Inter', sans-serif;
      --transition: 0.3s ease;
      --danger: #b00020;
      --success: #1f5b4f;
    }

    body {
      font-family: var(--sans);
      background: linear-gradient(135deg, var(--secondary) 0%, var(--bg) 55%, rgba(232, 242, 236, .35) 100%);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(255, 255, 255, .65);
      backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(10, 38, 34, .08);
      box-shadow: 0 20px 50px rgba(10, 38, 34, .08);
      overflow: hidden;
    }

    .left {
      padding: 60px 50px;
      background: rgba(249, 249, 246, .85);
    }

    .right {
      min-height: 680px;
      background:
        linear-gradient(rgba(10, 38, 34, .18), rgba(10, 38, 34, .18)),
        url('https://media.base44.com/images/public/69e1f4b87a927963a99283d5/09bb6862f_generated_7c9c6a71.png') center/cover no-repeat;
      position: relative;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 4vw, 4rem);
      line-height: 1.03;
      margin-bottom: 16px;
    }

    .sub {
      color: rgba(10, 38, 34, .62);
      line-height: 1.8;
      margin-bottom: 28px;
      font-size: 15px;
    }

    .group { margin-bottom: 16px; }

    .group label {
      display: block;
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(10, 38, 34, .5);
      margin-bottom: 8px;
    }

    .group input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid rgba(10, 38, 34, .15);
      background: transparent;
      outline: none;
      font-size: 15px;
      color: var(--fg);
    }

    .group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(185, 148, 112, .08);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: var(--primary-fg);
      font-size: 12px;
      letter-spacing: .24em;
      text-transform: uppercase;
      font-weight: 500;
      transition: background var(--transition);
      margin-top: 8px;
    }

    .btn:hover { background: var(--accent); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      font-size: 14px;
      display: none;
      line-height: 1.6;
      border: 1px solid transparent;
    }

    .msg.error {
      color: var(--danger);
      background: rgba(176, 0, 32, .05);
      border-color: rgba(176, 0, 32, .12);
    }

    .msg.success {
      color: var(--success);
      background: rgba(232, 242, 236, .55);
      border-color: rgba(10, 38, 34, .08);
    }

    .msg.show { display: block; }

    .links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .links a {
      text-decoration: none;
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(10, 38, 34, .52);
    }

    .links a:hover { color: var(--accent); }

    .tag {
      position: absolute;
      bottom: 28px;
      left: 28px;
      background: rgba(249, 249, 246, .84);
      padding: 18px 22px;
      border: 1px solid rgba(10, 38, 34, .08);
      max-width: 240px;
    }

    .tag .small {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .tag h3 {
      font-family: var(--serif);
      font-size: 24px;
      line-height: 1.2;
    }

    @media(max-width:900px) {
      .wrap { grid-template-columns: 1fr; }
      .right { min-height: 240px; order: -1; }
      .left { padding: 38px 24px; }
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="left">
      <div class="eyebrow">Account Recovery</div>
      <h1>Forgot your password?</h1>
      <p class="sub">
        Enter your registered email address. We will send a password reset link to your Gmail inbox.
      </p>

      <div class="group">
        <label for="recoveryInput">Email Address</label>
        <input type="email" id="recoveryInput" placeholder="Enter your email address">
      </div>

      <button type="button" class="btn" id="sendBtn">Send Reset Link</button>

      <div class="msg" id="forgotMsg"></div>

      <div class="links">
        <a href="login.html">Back to Login</a>
        <a href="index.html">Back to Website</a>
      </div>
    </div>

    <div class="right">
      <div class="tag">
        <div class="small">Advance Ayurveda</div>
        <h3>Secure account recovery.</h3>
      </div>
    </div>
  </div>

  <!-- ✅ Firebase Modular SDK — fixes "firebase is not defined" error -->
  <script type="module">
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ✅ Your Firebase config
    const app  = initializeApp({
      apiKey:    "AIzaSyD6D-SpipI6gIRo_FWZkRxBG1oOyAY6J7E",
      authDomain:"olifeplusweb.firebaseapp.com",
      projectId: "olifeplusweb",
      appId:     "1:178557755300:web:216d189f5a2cf8ed3fab31",
    });
    const auth = getAuth(app);

    const btn = document.getElementById("sendBtn");
    const msg = document.getElementById("forgotMsg");

    btn.addEventListener("click", async () => {
      const email = document.getElementById("recoveryInput").value.trim();

      // Reset message
      msg.className = "msg";
      msg.innerText  = "";

      // ── Validation ──────────────────────────────────────
      if (!email) {
        msg.innerText  = "Email address enter karo.";
        msg.className  = "msg error show";
        return;
      }

      if (!/\S+@\S+\.\S+/.test(email)) {
        msg.innerText  = "Valid email address enter karo ❌";
        msg.className  = "msg error show";
        return;
      }

      // ── Send reset email ─────────────────────────────────
      btn.disabled   = true;
      btn.innerText  = "Sending...";

      try {
        await sendPasswordResetEmail(auth, email);

        // ✅ SUCCESS — email sent to Gmail
        msg.innerText = "✅ Password reset link tamara Gmail par mokli didho! Inbox ya Spam folder check karo.";
        msg.className = "msg success show";

      } catch (error) {

        // ❌ ERROR — show exact reason
        if (error.code === "auth/user-not-found") {
          msg.innerText = "❌ Aa email thi koi account registered nathi.";
        } else if (error.code === "auth/invalid-email") {
          msg.innerText = "❌ Invalid email address.";
        } else if (error.code === "auth/too-many-requests") {
          msg.innerText = "⚠️ Vadhare requests. Thodi var rahi ne fari try karo.";
        } else if (error.code === "auth/network-request-failed") {
          msg.innerText = "⚠️ Internet connection check karo.";
        } else {
          msg.innerText = "❌ Error: " + error.code;
        }
        msg.className = "msg error show";

      } finally {
        btn.disabled  = false;
        btn.innerText = "Send Reset Link";
      }
    });
  </script>

</body>
</html>
